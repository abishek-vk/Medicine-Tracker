kind = "web"
previewPath = "/"
title = "Smart Medicine Expiry Tracker"
version = "1.0.0"
id = "artifacts/medicine-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18226

[services.development]
run = "pnpm --filter @workspace/medicine-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medicine-tracker", "run", "build" ]
publicDir = "artifacts/medicine-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18226"
BASE_PATH = "/"
